name: Build MSurvivalLobby

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build Plugin
        run: mvn clean package

      - name: Upload Plugin
        uses: actions/upload-artifact@v4
        with:
          name: MSurvivalLobby
          path: target/*.jar
          if-no-files-found: error
