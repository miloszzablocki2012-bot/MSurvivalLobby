settings:
  teleport-on-join: true
  teleport-delay-ticks: 20
  give-menu-item-on-join: true

lobby:
  world: "Lobby"
  x: 0.5
  y: 100.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

survival:
  world: "world"
  x: 0.5
  y: 100.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

survival-teleport:
  use-bed-spawn: true
  random-spawn-for-new-players: true
  remember-random-spawn: true
  random-radius: 800
  min-y: 60
  max-tries: 80

lobby-inventory:
  enabled: true
  save-and-hide-items: true
  restore-on-survival: true
  clear-armor: true
  clear-offhand: true
  save-xp: true

protection:
  enabled: true
  block-break: true
  block-place: true
  pvp: false
  damage: false
  hunger: false
  item-drop: false
  item-pickup: false
  inventory-click: false
  weather-clear: true

menu-item:
  slot: 4
  material: COMPASS
  name: "&6&lMSurvival Menu"
  lore:
    - "&8Nawigacja serwera"
    - ""
    - "&7Kliknij PPM, aby otworzyć menu."
    - "&eLobby &8• &aSurvival &8• &6Klucze"

gui:
  title: "&6&lMSURVIVAL MENU"
  size: 27
  filler: BLACK_STAINED_GLASS_PANE

  lobby:
    slot: 11
    material: NETHER_STAR
    name: "&e&lLobby"
    lore:
      - "&7Powrót do lobby."
      - "&eKliknij, aby przejść."

  survival:
    slot: 13
    material: GRASS_BLOCK
    name: "&a&lSurvival"
    lore:
      - "&7Główny survival serwera."
      - "&eKliknij, aby wejść."

  keys:
    slot: 15
    material: LIGHTNING_ROD
    name: "&6&lKlucze"
    lore:
      - "&7Otwiera menu kluczy."
      - "&8Jeśli plugin kluczy działa,"
      - "&8otworzy się jego menu."

bots:
  enabled: true
  auto-spawn-on-enable: false
  type: VILLAGER
  click-cooldown-ms: 1500

