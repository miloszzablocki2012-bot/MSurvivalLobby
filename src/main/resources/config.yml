  prefix: "&6&lMSurvivalLobby &8» &r"
  no-permission: "&cNie masz uprawnień."
  usage-import: "&cUżycie: &e/importlobby <nazwa_swiata>"
  importing: "&aImportuję świat lobby: &e%world%&a..."
