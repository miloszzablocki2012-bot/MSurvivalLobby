name: MSurvivalLobby
version: 2.0
main: pl.msurvival.lobby.MSurvivalLobby
api-version: '1.21'
author: Milekz
softdepend:
  - Multiverse-Core
  - MSurvivalKeys

commands:
  lobby:
    description: Teleportuje do lobby
    usage: /lobby
    aliases: [hub]
  setlobby:
    description: Ustawia lobby
    usage: /setlobby
  importlobby:
    description: Importuje świat lobby przez Multiverse i ustawia go w configu
    usage: /importlobby <nazwa_swiata>
  lobbyreload:
    description: Przeładowuje config lobby
    usage: /lobbyreload

permissions:
  msurvivallobby.admin:
    default: op
