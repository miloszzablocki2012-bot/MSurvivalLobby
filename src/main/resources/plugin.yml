name: MSurvivalLobby
version: 6.0
main: pl.msurvival.lobby.MSurvivalLobby
api-version: '1.21'
author: Milekz
softdepend:
  - Multiverse-Core
  - MSurvivalKeys

commands:
  lobby:
    usage: /lobby [gracz]
    aliases: [hub]
  survival:
    usage: /survival [gracz]
  setlobby:
    usage: /setlobby
  setsurvival:
    usage: /setsurvival
  importlobby:
    usage: /importlobby <nazwa_swiata>
  lobbyreload:
    usage: /lobbyreload
  setbot:
    usage: /setbot <id>
  spawnbots:
    usage: /spawnbots
  removebots:
    usage: /removebots

permissions:
  msurvivallobby.admin:
    default: op
